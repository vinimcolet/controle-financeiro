# ===========================
# ConfigurańŃo do Banco MySQL
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/controle_financeiro
spring.datasource.username=controle
spring.datasource.password=${DB_PASSWORD:senha123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===========================
# ConfigurańŃo JWT
# ===========================
jwt.secret=${JWT_SECRET:senhateste}
jwt.expiration=14400000
# 14400000 ms = 4 horas